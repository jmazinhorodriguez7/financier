<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Financier — Sistema de gestão de empréstimos pessoais com juros mensais">
    <title>Financier — Gestão de Empréstimos (v1.1)</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- jsPDF para geração do PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- jsPDF AutoTable para tabelas formatadas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="no-shell">
    <div class="app-layout">
        <!-- Sidebar (injected by app.js after auth) -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Top Header (injected by app.js after auth) -->
        <header class="header" id="top-header"></header>

        <!-- Main Content (only element that scrolls) -->
        <main class="content" id="conteudo-principal"></main>
    </div>

    <!-- Core -->
    <script>
      (function() {
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
          console.log = function() {};
          console.warn = function() {};
          console.info = function() {};
        }
      })();
    </script>
    <script src="env.js"></script>
    <script src="supabase-client.js"></script>

    <!-- Utils -->
    <script src="utils/formatadores.js"></script>
    <script src="utils/validadores.js"></script>
    <script src="utils/datas.js"></script>

    <!-- Modules -->
    <script src="modules/calculos.js?v=2"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/devedores.js"></script>
    <script src="modules/emprestimos.js"></script>
    <script src="modules/pagamentos.js"></script>
    <script src="modules/pdf-exportador.js?v=2"></script>
    <script src="modules/proposta.js"></script>

    <!-- Screens -->
    <script src="screens/tela-login.js"></script>
    <script src="screens/tela-dashboard.js"></script>
    <script src="screens/tela-devedores.js"></script>
    <script src="screens/tela-perfil-devedor.js"></script>
    <script src="screens/tela-novo-emprestimo.js?v=2"></script>
    <script src="screens/tela-detalhe-emprestimo.js?v=3"></script>
    <script src="screens/tela-exportar-pdf.js"></script>
    <script src="screens/tela-simulador.js"></script>
    <script src="screens/tela-configuracoes.js"></script>

    <!-- App Router (must be last) -->
    <script src="app.js?v=3"></script>
</body>
</html>
